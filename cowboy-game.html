<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cowboy Shooter Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        canvas {
            border: 4px solid #333;
            background: linear-gradient(180deg, #87CEEB 0%, #DEB887 100%);
            cursor: crosshair;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #ui {
            color: white;
            font-size: 18px;
            display: flex;
            gap: 40px;
            background: rgba(0,0,0,0.5);
            padding: 15px 30px;
            border-radius: 10px;
            min-width: 400px;
            justify-content: space-around;
        }

        #gameOverScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 30px;
        }

        #gameOverScreen.show {
            display: flex;
        }

        #gameOverScreen h1 {
            color: #ff6b6b;
            font-size: 60px;
            text-shadow: 0 0 10px rgba(255,0,0,0.5);
        }

        #gameOverScreen p {
            color: white;
            font-size: 24px;
        }

        #gameOverScreen button {
            padding: 15px 40px;
            font-size: 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #gameOverScreen button:hover {
            background: #764ba2;
        }

        #instructions {
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
        }

        #instructions p {
            margin: 5px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1 style="color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">🤠 COWBOY SHOOTER 🤠</h1>
        <div id="instructions">
            <p><strong>🖱️ Move Mouse</strong> to aim | <strong>🖱️ Click</strong> to shoot | <strong>⬆️⬇️⬅️➡️ or WASD</strong> to move</p>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div>❤️ Health: <span id="health">100</span></div>
            <div>💀 Enemies: <span id="enemies">0</span></div>
            <div>⭐ Score: <span id="score">0</span></div>
            <div>🌊 Wave: <span id="wave">1</span></div>
        </div>
    </div>

    <div id="gameOverScreen">
        <h1>GAME OVER</h1>
        <p id="finalScore">Score: 0</p>
        <p id="waveReached">Wave: 1</p>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game objects
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            width: 20,
            height: 20,
            speed: 5,
            health: 100,
            maxHealth: 100
        };

        let enemies = [];
        let bullets = [];
        let score = 0;
        let wave = 1;
        let waveEnemiesKilled = 0;
        let gameOver = false;

        const keys = {};
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        // Event listeners
        document.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('click', () => {
            shootBullet();
        });

        // Create enemy
        function createEnemy() {
            const side = Math.floor(Math.random() * 4);
            let x, y;

            if (side === 0) { // top
                x = Math.random() * canvas.width;
                y = -20;
            } else if (side === 1) { // right
                x = canvas.width + 20;
                y = Math.random() * canvas.height;
            } else if (side === 2) { // bottom
                x = Math.random() * canvas.width;
                y = canvas.height + 20;
            } else { // left
                x = -20;
                y = Math.random() * canvas.height;
            }

            enemies.push({
                x: x,
                y: y,
                width: 25,
                height: 25,
                speed: 2 + wave * 0.5,
                health: 1 + Math.floor(wave / 2)
            });
        }

        // Shoot bullet
        function shootBullet() {
            const dx = mouseX - player.x;
            const dy = mouseY - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            bullets.push({
                x: player.x,
                y: player.y,
                vx: (dx / dist) * 7,
                vy: (dy / dist) * 7,
                radius: 5
            });
        }

        // Update
        function update() {
            if (gameOver) return;

            // Player movement
            if (keys['arrowup'] || keys['w']) player.y -= player.speed;
            if (keys['arrowdown'] || keys['s']) player.y += player.speed;
            if (keys['arrowleft'] || keys['a']) player.x -= player.speed;
            if (keys['arrowright'] || keys['d']) player.x += player.speed;

            // Boundary check
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

            // Update bullets
            bullets = bullets.filter(bullet => {
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                return bullet.x > 0 && bullet.x < canvas.width && bullet.y > 0 && bullet.y < canvas.height;
            });

            // Update enemies
            enemies.forEach(enemy => {
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 0) {
                    enemy.x += (dx / dist) * enemy.speed;
                    enemy.y += (dy / dist) * enemy.speed;
                }

                // Check collision with player
                if (isColliding(player, enemy)) {
                    player.health -= 0.5;
                    if (player.health <= 0) {
                        endGame();
                    }
                }
            });

            // Bullet-enemy collision
            for (let i = bullets.length - 1; i >= 0; i--) {
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const bullet = bullets[i];
                    const enemy = enemies[j];
                    const dx = bullet.x - (enemy.x + enemy.width / 2);
                    const dy = bullet.y - (enemy.y + enemy.height / 2);
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < bullet.radius + enemy.width / 2) {
                        bullets.splice(i, 1);
                        enemy.health--;

                        if (enemy.health <= 0) {
                            enemies.splice(j, 1);
                            score += 10 * wave;
                            waveEnemiesKilled++;

                            if (waveEnemiesKilled >= 5 + wave * 2) {
                                nextWave();
                            }
                        }
                        break;
                    }
                }
            }

            // Spawn enemies
            if (Math.random() < 0.02 + wave * 0.005) {
                createEnemy();
            }

            // Update UI
            document.getElementById('health').textContent = Math.max(0, Math.floor(player.health));
            document.getElementById('enemies').textContent = enemies.length;
            document.getElementById('score').textContent = score;
            document.getElementById('wave').textContent = wave;
        }

        // Check collision
        function isColliding(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // Next wave
        function nextWave() {
            wave++;
            waveEnemiesKilled = 0;
            enemies = [];
            player.health = Math.min(player.maxHealth, player.health + 20);
        }

        // End game
        function endGame() {
            gameOver = true;
            document.getElementById('gameOverScreen').classList.add('show');
            document.getElementById('finalScore').textContent = `Score: ${score}`;
            document.getElementById('waveReached').textContent = `Wave: ${wave}`;
        }

        // Draw
        function draw() {
            // Background
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grass ground
            ctx.fillStyle = '#8B7355';
            ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

            // Draw player (cowboy)
            drawCowboy(player.x, player.y);

            // Draw bullets
            bullets.forEach(bullet => {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                ctx.fill();

                // Bullet trail
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(bullet.x, bullet.y);
                ctx.lineTo(bullet.x - bullet.vx * 3, bullet.y - bullet.vy * 3);
                ctx.stroke();
            });

            // Draw enemies
            enemies.forEach(enemy => {
                drawEnemy(enemy.x, enemy.y, enemy.health);
            });
        }

        // Draw cowboy
        function drawCowboy(x, y) {
            // Hat
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x - 12, y - 15, 24, 8);
            ctx.fillRect(x - 14, y - 13, 28, 3);

            // Head
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(x - 8, y - 8, 16, 12);

            // Eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(x - 4, y - 4, 2, 2);
            ctx.fillRect(x + 2, y - 4, 2, 2);

            // Body
            ctx.fillStyle = '#DC143C';
            ctx.fillRect(x - 8, y + 4, 16, 12);

            // Arms
            ctx.fillStyle = '#DEB887';
            const angle = Math.atan2(mouseY - y, mouseX - x);
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillRect(5, -2, 8, 4);
            ctx.restore();

            // Legs
            ctx.fillStyle = '#333';
            ctx.fillRect(x - 6, y + 16, 4, 6);
            ctx.fillRect(x + 2, y + 16, 4, 6);

            // Gun barrel direction indicator
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + Math.cos(angle) * 15, y + Math.sin(angle) * 15);
            ctx.stroke();
        }

        // Draw enemy
        function drawEnemy(x, y, health) {
            // Hat
            ctx.fillStyle = '#000';
            ctx.fillRect(x - 12, y - 12, 24, 8);
            ctx.fillRect(x - 14, y - 10, 28, 3);

            // Head
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x - 8, y - 5, 16, 12);

            // Eyes (evil)
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(x - 4, y - 1, 2, 2);
            ctx.fillRect(x + 2, y - 1, 2, 2);

            // Body
            ctx.fillStyle = '#333';
            ctx.fillRect(x - 8, y + 7, 16, 12);

            // Legs
            ctx.fillStyle = '#000';
            ctx.fillRect(x - 6, y + 19, 4, 6);
            ctx.fillRect(x + 2, y + 19, 4, 6);

            // Health bar
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(x - 12, y - 20, 24, 3);
            ctx.fillStyle = '#00FF00';
            ctx.fillRect(x - 12, y - 20, 24 * Math.max(0, health / 2), 3);
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
